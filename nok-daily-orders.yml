name: Nok Daily Orders

# 11:10 UTC = 7:10 AM ET during EDT (Mar–Nov), 6:10 AM ET during EST (Nov–Mar).
# Summary is about yesterday's numbers, so a ~1hr shift across DST is harmless.
# If you want exactly 7 AM ET year-round, add a second cron at 12:10 UTC and
# gate each with `if` on the current month.
on:
  schedule:
    - cron: "10 11 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: daily-orders
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: daily-orders/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily orders
        env:
          IM_MERCHANT_USER: ${{ secrets.IM_MERCHANT_USER }}
          IM_MERCHANT_KEY:  ${{ secrets.IM_MERCHANT_KEY }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0961GBT4BY
          OUT_DIR: ${{ github.workspace }}/daily-orders/out
        run: python scripts/run_daily.py

      - name: Upload xlsx artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nok-orders-dump
          path: daily-orders/out/
          if-no-files-found: ignore
          retention-days: 30
